<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}Nolwazi Blog{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #e63946 0%, #9d0208 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .auth-card {
            background: #fff;
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        .auth-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #e63946;
            margin-bottom: 0.25rem;
        }
        .auth-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #212529;
            margin-bottom: 0.25rem;
        }
        .auth-subtitle {
            color: #6c757d;
            margin-bottom: 1.75rem;
        }
        .form-control-lg {
            border-radius: 10px;
        }
        .form-control-lg:focus {
            border-color: #e63946;
            box-shadow: 0 0 0 0.2rem rgba(230,57,70,.2);
        }
        .btn-danger {
            border-radius: 10px;
            font-weight: 600;
            padding: .75rem;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <i class="bi bi-cup-hot me-1"></i> Nolwazi Blog
        </div>
        <h1 class="auth-title">{% block auth_title %}{% endblock %}</h1>
        <p class="auth-subtitle">{% block auth_subtitle %}{% endblock %}</p>

        {% block auth_form %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
